{% extends "shared/base_super_admin.html" %}

{% block title %}Select Tenant{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-header bg-white border-0 p-4">
                    <h5 class="fw-bold mb-0">
                        <i class="fas fa-building text-primary me-2"></i>Select Tenant
                    </h5>
                    <p class="text-muted small mb-0">Choose a tenant to add a user to</p>
                </div>
                <div class="card-body p-4">
                    <form method="GET" action="{% url 'users:add_user' %}">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Select Tenant</label>
                            <select name="tenant_id" class="form-select" required>
                                <option value="">-- Select Tenant --</option>
                                {% for tenant in tenants %}
                                <option value="{{ tenant.id }}">{{ tenant.company_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary rounded-pill px-4">
                                <i class="fas fa-arrow-right me-1"></i>Continue
                            </button>
                            <a href="{% url 'users:user_list' %}" class="btn btn-secondary rounded-pill px-4">
                                <i class="fas fa-times me-1"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
