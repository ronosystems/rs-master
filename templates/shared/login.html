<!-- templates/shared/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - POS Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #808080 0%, #8b8b8b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgb(0, 0, 0);
            padding: 40px 35px;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }
        
        .login-header .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #002fff, #0026ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 35px;
            color: white;
            box-shadow: 0 5px 15px rgb(0, 0, 0);
        }
        
        .login-header h3 {
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 5px;
        }
        
        .login-header p {
            color: #718096;
            font-size: 0.9rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            font-weight: 600;
            color: #4a5568;
            font-size: 0.85rem;
            margin-bottom: 6px;
            display: block;
        }
        
        .form-group .input-group {
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #e2e8f0;
            transition: all 0.3s;
            background: white;
        }
        
        .form-group .input-group:focus-within {
            border-color: #000000;
            box-shadow: 0 0 0 3px rgb(0, 0, 0);
        }
        
        .form-group .input-group-text {
            background: white;
            border: none;
            color: #000000;
            padding: 0 12px 0 15px;
        }
        
        .form-group .form-control {
            border: none;
            padding: 12px 15px 12px 5px;
            font-size: 0.95rem;
            background: white;
        }
        
        .form-group .form-control:focus {
            box-shadow: none;
        }
        
        .form-group .form-control::placeholder {
            color: #a0aec0;
        }
        
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.85rem;
        }
        
        .form-options .form-check {
            margin: 0;
        }
        
        .form-options .form-check-input {
            cursor: pointer;
        }
        
        .form-options .form-check-label {
            color: #000000;
            cursor: pointer;
        }
        
        .form-options a {
            color: #667eea;
            text-decoration: none;
        }
        
        .form-options a:hover {
            text-decoration: underline;
        }
        
        .btn-login {
            background: linear-gradient(135deg, #0024c7, #001aff);
            box-shadow: 0 8px 25px rgb(0, 0, 0);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgb(0, 0, 0);
            color: white;
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .btn-login i {
            margin-right: 8px;
        }
        
        .login-footer {
            text-align: center;
            margin-top: 25px;
            color: #a0aec0;
            font-size: 0.8rem;
        }
        
        .login-footer a {
            color: #667eea;
            text-decoration: none;
        }
        
        .alert {
            border-radius: 10px;
            border: none;
            padding: 12px 16px;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        
        .alert-success {
            background: #f0fff4;
            color: #22543d;
        }
        
        .alert-error {
            background: #fff5f5;
            color: #9b2c2c;
        }
        
        .alert-warning {
            background: #fffff0;
            color: #744210;
        }
        
        .alert-info {
            background: #ebf8ff;
            color: #2a69ac;
        }
        
        .alert i {
            margin-right: 8px;
        }
        
        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #1a1a2e, #16213e);
            }
            
            .login-card {
                background: #1e1e2e;
            }
            
            .login-header h3 {
                color: #e0e0e0;
            }
            
            .login-header p {
                color: #a0a0a0;
            }
            
            .form-group label {
                color: #c0c0c0;
            }
            
            .form-group .input-group {
                border-color: #3d3d54;
                background: #1a1a2e;
            }
            
            .form-group .input-group-text {
                background: #1a1a2e;
                color: #6c6c8a;
            }
            
            .form-group .form-control {
                background: #1a1a2e;
                color: #e0e0e0;
            }
            
            .form-group .form-control::placeholder {
                color: #6c6c8a;
            }
            
            .form-options .form-check-label {
                color: #c0c0c0;
            }
            
            .login-footer {
                color: #6c6c8a;
            }
        }
        
        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
            
            .login-header .logo {
                width: 60px;
                height: 60px;
                font-size: 28px;
            }
            
            .login-header h3 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Header -->
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-store"></i>
                </div>
                <h3>Welcome Back</h3>
                <p>Sign in to your account to continue</p>
            </div>
            
            <!-- Messages -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        <i class="fas {% if message.tags == 'success' %}fa-check-circle{% elif message.tags == 'error' %}fa-exclamation-circle{% else %}fa-info-circle{% endif %}"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
            
            <!-- Login Form -->
            <form method="post">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="username"><i class="fas fa-user me-2"></i>Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" name="username" id="username" class="form-control" placeholder="Enter your username" required autofocus>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock me-2"></i>Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" name="password" id="password" class="form-control" placeholder="Enter your password" required>
                        <button type="button" class="btn btn-outline-secondary border-0" onclick="togglePassword()" style="background: white;">
                            <i class="fas fa-eye" id="togglePasswordIcon"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-options">
                    <div class="form-check">
                        <input type="checkbox" name="remember" id="remember" class="form-check-input">
                        <label for="remember" class="form-check-label">Remember me</label>
                    </div>
                    <a href="#">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>
            
            <div class="login-footer">
                &copy; {% now "Y" %} POS Portal. All rights reserved.
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const icon = document.getElementById('togglePasswordIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
        
        // Auto-dismiss alerts after 5 seconds
        setTimeout(function() {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(function(alert) {
                alert.style.transition = 'opacity 0.5s ease';
                alert.style.opacity = '0';
                setTimeout(function() {
                    alert.remove();
                }, 500);
            });
        }, 5000);
    </script>
</body>
</html>
