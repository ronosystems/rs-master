<!-- templates/shared/maintenance.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #000000 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .maintenance-container {
            text-align: center;
            color: white;
            padding: 20px;
            box-shadow: #2f00ff;
        }
        .maintenance-icon {
            font-size: 80px;
            margin-bottom: 30px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .maintenance-title {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgb(255, 0, 0);
        }
        .maintenance-subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        .maintenance-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .status-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ffc107;
            margin-right: 8px;
            animation: blink 1.5s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .maintenance-features {
            text-align: left;
            margin: 20px 0;
        }
        .maintenance-features li {
            padding: 8px 0;
            list-style: none;
        }
        .maintenance-features li i {
            margin-right: 10px;
            color: #ffc107;
        }
        .btn-login {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 12px 40px;
            border-radius: 30px;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-block;
        }
        .btn-login:hover {
            background: rgba(255,255,255,0.3);
            color: white;
            transform: translateY(-2px);
        }
        @media (max-width: 768px) {
            .maintenance-title { font-size: 2rem; }
            .maintenance-card { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <div class="maintenance-card">
            <div class="maintenance-icon">
                <i class="fas fa-tools"></i>
            </div>
            <h1 class="maintenance-title">We'll Be Back Soon!</h1>
            <p class="maintenance-subtitle">
                <span class="status-dot"></span>
                System is currently under maintenance
            </p>
            
            <div class="alert alert-warning bg-transparent border-warning text-light">
                <i class="fas fa-clock me-2"></i>
                Estimated downtime: 2 hours
            </div>
            
            <div class="maintenance-features">
                <ul class="text-light">
                    <li><i class="fas fa-check-circle"></i> We're upgrading the system</li>
                    <li><i class="fas fa-check-circle"></i> Adding new features</li>
                    <li><i class="fas fa-check-circle"></i> Improving performance</li>
                    <li><i class="fas fa-check-circle"></i> Security updates</li>
                </ul>
            </div>
            
            <div class="mt-4">
                <a href="{% url 'portal:login' %}" class="btn-login">
                    <i class="fas fa-sign-in-alt me-2"></i>Login (Authorized Personel Only)
                </a>
            </div>
            
            <div class="mt-4 text-light opacity-50 small">
                <i class="fas fa-copyright me-1"></i> {{ now|date:"Y" }} RS Master Platform
            </div>
        </div>
    </div>
    
    <script>
        // Auto-refresh every 30 seconds to check if maintenance is over
        setTimeout(function() {
            location.reload();
        }, 30000);
    </script>
</body>
</html>
