{% extends "shared/base_main.html" %}

{% block title %}Create Return{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-warning">
            <h5><i class="fas fa-undo-alt"></i> Create Return - Invoice: {{ sale.invoice_no }}</h5>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label">Select Item to Return</label>
                    <select name="item_id" class="form-select" required>
                        <option value="">-- Select Item --</option>
                        {% for item in sale_items %}
                        <option value="{{ item.id }}">
                            {{ item.product.name }} - Qty: {{ item.quantity }} - Price: KES {{ item.price }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Quantity to Return</label>
                    <input type="number" name="quantity" class="form-control" value="1" min="1" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Reason for Return</label>
                    <select name="reason" class="form-select" required>
                        <option value="">-- Select Reason --</option>
                        {% for value, label in reasons %}
                        <option value="{{ value }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Additional Notes</label>
                    <textarea name="notes" class="form-control" rows="3"></textarea>
                </div>
                
                <button type="submit" class="btn btn-warning">Submit Return Request</button>
                <a href="{% url 'tronic_master:sales_history' %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
