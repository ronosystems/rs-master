{% extends "shared/base_main.html" %}

{% block title %}Add User{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg">
                <div class="card-header bg-primary text-white py-3">
                    <h5 class="mb-0">
                        <i class="fas fa-user-plus me-2"></i>Add New Staff / User
                    </h5>
                </div>
                <div class="card-body p-4">
                    <form method="post" action="{% url 'users:add_user' %}">
                        {% csrf_token %}
                        
                        {% if is_super_admin %}
                        <div class="mb-3">
                            <label class="form-label">Tenant *</label>
                            <select name="tenant_id" class="form-select" required>
                                <option value="">-- Select Tenant --</option>
                                {% for t in all_tenants %}
                                <option value="{{ t.id }}">{{ t.company_name }} ({{ t.code }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        {% endif %}
                        
                        <div class="mb-3">
                            <label class="form-label">Username *</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label">First Name</label>
                                <input type="text" name="first_name" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Last Name</label>
                                <input type="text" name="last_name" class="form-control">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="text" name="phone_number" class="form-control">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Password *</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Confirm Password *</label>
                            <input type="password" name="confirm_password" class="form-control" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Role *</label>
                            <select name="role" class="form-select" required>
                                {% for role_value, role_label in role_choices %}
                                    {% if role_value != 'super_admin' or is_super_admin %}
                                        <option value="{{ role_value }}">{{ role_label }}</option>
                                    {% endif %}
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">PIN Code (4-6 digits for POS)</label>
                            <input type="text" name="pin_code" class="form-control" maxlength="6" pattern="[0-9]{4,6}">
                            <small class="text-muted">Optional numeric PIN for POS access</small>
                        </div>
                        
                        <hr class="my-4">
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="fas fa-save me-2"></i>Add User
                            </button>
                            <a href="{% url 'users:user_list' %}" class="btn btn-secondary px-4">
                                <i class="fas fa-times me-2"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
