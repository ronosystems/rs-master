{% extends 'tronic_master/base_tronic.html' %}
{% load static %}

{% block title %}Edit Category - Inventory Management{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card">
                <div class="card-header bg-warning text-dark">
                    <h3 class="mb-0">Edit Category: {{ category.name }}</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="name" class="form-label">Category Name *</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ category.name }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="item_type" class="form-label">Item Type *</label>
                            <select class="form-control" id="item_type" name="item_type" required>
                                <option value="single" {% if category.item_type == 'single' %}selected{% endif %}>Single Item (IMEI/Serial tracked)</option>
                                <option value="bulk" {% if category.item_type == 'bulk' %}selected{% endif %}>Bulk Item (Quantity tracked)</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="identifier_type" class="form-label">Identifier Type</label>
                            <select class="form-control" id="identifier_type" name="identifier_type">
                                <option value="imei" {% if category.identifier_type == 'imei' %}selected{% endif %}>IMEI Number (15-digit)</option>
                                <option value="serial" {% if category.identifier_type == 'serial' %}selected{% endif %}>Serial Number</option>
                                <option value="none" {% if category.identifier_type == 'none' %}selected{% endif %}>No Unique Identifier</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="3">{{ category.description }}</textarea>
                        </div>
                        
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="is_active" name="is_active" {% if category.is_active %}checked{% endif %}>
                            <label class="form-check-label" for="is_active">Active</label>
                        </div>
                        
                        <div class="text-center">
                            <button type="submit" class="btn btn-warning">Update Category</button>
                            <a href="{% url 'tronic_master:category_list' %}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
