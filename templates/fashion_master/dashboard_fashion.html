{% extends "fashion_master/base_fashion.html" %}
{% block title %}FASHION MASTER Dashboard{% endblock %}
{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2"><i class="fas fa-tshirt text-pink me-2"></i>Fashion Dashboard</h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        <span class="badge bg-pink me-2"><i class="fas fa-building me-1"></i> {{ tenant.company_name }}</span>
        <span class="badge bg-pink"><i class="fas fa-project-diagram me-1"></i> FASHION MASTER</span>
    </div>
</div>
<div class="row">
    <div class="col-12"><div class="card card-fashion bg-light"><div class="card-body text-center py-5"><i class="fas fa-tools fa-4x text-pink mb-3"></i><h4>FASHION MASTER - Coming Soon!</h4><p class="text-muted">Fashion management features are under development.</p><div class="progress" style="height: 10px; max-width: 400px; margin: 0 auto;"><div class="progress-bar bg-pink" style="width: 5%;"></div></div><p class="text-muted small mt-2">5% complete</p></div></div></div>
</div>
{% endblock %}
