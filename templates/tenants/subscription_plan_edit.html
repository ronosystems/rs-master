{% extends 'tech_master/base_tech.html' %}
{% block title %}Edit Subscription Plan - {{ plan.name }}{% endblock %}
{% block content %}
<div class="container-fluid mt-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card border-0 shadow-lg">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="fas fa-edit me-2"></i>Edit Subscription Plan: {{ plan.name }}</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-md-6"><div class="mb-3"><label class="form-label">Plan Name *</label><input type="text" name="name" class="form-control" value="{{ plan.name }}" required><small class="text-muted">Display name of the plan</small></div></div>
                            <div class="col-md-6"><div class="mb-3"><label class="form-label">Plan Code *</label><input type="text" name="code" class="form-control" value="{{ plan.code }}" required><small class="text-muted">Unique identifier (will be auto-uppercased)</small></div></div>
                        </div>
                        <div class="row">
                            <div class="col-md-6"><div class="mb-3"><label class="form-label">Monthly Price (KES) *</label><input type="number" name="price_monthly" class="form-control" value="{{ plan.price_monthly }}" step="0.01" required></div></div>
                            <div class="col-md-6"><div class="mb-3"><label class="form-label">Yearly Price (KES) *</label><input type="number" name="price_yearly" class="form-control" value="{{ plan.price_yearly }}" step="0.01" required></div></div>
                        </div>
                        <div class="row">
                            <div class="col-md-4"><div class="mb-3"><label class="form-label">Max Users</label><input type="number" name="max_users" class="form-control" value="{{ plan.max_users }}"></div></div>
                            <div class="col-md-4"><div class="mb-3"><label class="form-label">Max Products</label><input type="number" name="max_products" class="form-control" value="{{ plan.max_products }}"></div></div>
                            <div class="col-md-4"><div class="mb-3"><label class="form-label">Max Branches</label><input type="number" name="max_branches" class="form-control" value="{{ plan.max_branches }}"></div></div>
                        </div>
                        <div class="row">
                            <div class="col-md-4"><div class="mb-3"><label class="form-label">Max Storage (GB)</label><input type="number" name="max_storage_gb" class="form-control" value="{{ plan.max_storage_gb }}"></div></div>
                            <div class="col-md-4"><div class="mb-3"><label class="form-label">Icon</label><select name="icon" class="form-select"><option value="fa-building" {% if plan.icon == 'fa-building' %}selected{% endif %}>🏢 Building</option><option value="fa-crown" {% if plan.icon == 'fa-crown' %}selected{% endif %}>👑 Crown</option><option value="fa-star" {% if plan.icon == 'fa-star' %}selected{% endif %}>⭐ Star</option><option value="fa-gem" {% if plan.icon == 'fa-gem' %}selected{% endif %}>💎 Gem</option><option value="fa-rocket" {% if plan.icon == 'fa-rocket' %}selected{% endif %}>🚀 Rocket</option><option value="fa-chart-line" {% if plan.icon == 'fa-chart-line' %}selected{% endif %}>📈 Chart</option><option value="fa-briefcase" {% if plan.icon == 'fa-briefcase' %}selected{% endif %}>💼 Briefcase</option><option value="fa-trophy" {% if plan.icon == 'fa-trophy' %}selected{% endif %}>🏆 Trophy</option></select></div></div>
                            <div class="col-md-4"><div class="mb-3"><label class="form-label">Color</label><select name="color" class="form-select"><option value="primary" {% if plan.color == 'primary' %}selected{% endif %}>🔵 Blue</option><option value="success" {% if plan.color == 'success' %}selected{% endif %}>🟢 Green</option><option value="warning" {% if plan.color == 'warning' %}selected{% endif %}>🟡 Yellow</option><option value="danger" {% if plan.color == 'danger' %}selected{% endif %}>🔴 Red</option><option value="info" {% if plan.color == 'info' %}selected{% endif %}>🔷 Cyan</option><option value="dark" {% if plan.color == 'dark' %}selected{% endif %}>⚫ Dark</option></select></div></div>
                        </div>
                        <div class="mb-3"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="2">{{ plan.description }}</textarea></div>
                        <div class="row">
                            <div class="col-md-6"><div class="mb-3 form-check"><input type="checkbox" name="is_active" class="form-check-input" {% if plan.is_active %}checked{% endif %} id="isActive"><label class="form-check-label" for="isActive">Active</label></div></div>
                            <div class="col-md-6">
                                <div class="mb-3 form-check"><input type="checkbox" name="feature_reports" class="form-check-input" {% if plan.features.reports %}checked{% endif %} id="featureReports"><label class="form-check-label" for="featureReports">📊 Reports</label></div>
                                <div class="mb-3 form-check"><input type="checkbox" name="feature_api" class="form-check-input" {% if plan.features.api %}checked{% endif %} id="featureApi"><label class="form-check-label" for="featureApi">🔌 API Access</label></div>
                                <div class="mb-3 form-check"><input type="checkbox" name="feature_advanced_reports" class="form-check-input" {% if plan.features.advanced_reports %}checked{% endif %} id="featureAdvancedReports"><label class="form-check-label" for="featureAdvancedReports">📈 Advanced Reports</label></div>
                                <div class="mb-3 form-check"><input type="checkbox" name="feature_support" class="form-check-input" {% if plan.features.support %}checked{% endif %} id="featureSupport"><label class="form-check-label" for="featureSupport">🛡️ Priority Support</label></div>
                            </div>
                        </div>
                        <div class="mt-4">
                            <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>Update Plan</button>
                            <a href="{% url 'tenants:subscription_plans_list' %}" class="btn btn-secondary"><i class="fas fa-times me-2"></i>Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
