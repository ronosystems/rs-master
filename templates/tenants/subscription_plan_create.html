{% extends 'tech_master/base_tech.html' %}
{% block title %}Add Subscription Plan{% endblock %}
{% block content %}
<div class="container-fluid mt-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card border-0 shadow-lg">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="fas fa-plus-circle me-2"></i>Create New Subscription Plan</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-md-6"><div class="mb-3"><label class="form-label">Plan Name *</label><input type="text" name="name" class="form-control" placeholder="e.g., Monthly Basic Subscriptions" required><small class="text-muted">Display name of the plan</small></div></div>
                            <div class="col-md-6"><div class="mb-3"><label class="form-label">Plan Code *</label><input type="text" name="code" class="form-control" placeholder="e.g., BASIC" required><small class="text-muted">Unique identifier (will be auto-uppercased)</small></div></div>
                        </div>
                        <div class="row">
                            <div class="col-md-6"><div class="mb-3"><label class="form-label">Monthly Price (KES) *</label><input type="number" name="price_monthly" class="form-control" placeholder="0.00" step="0.01" required></div></div>
                            <div class="col-md-6"><div class="mb-3"><label class="form-label">Yearly Price (KES) *</label><input type="number" name="price_yearly" class="form-control" placeholder="0.00" step="0.01" required></div></div>
                        </div>
                        <div class="row">
                            <div class="col-md-4"><div class="mb-3"><label class="form-label">Max Users</label><input type="number" name="max_users" class="form-control" value="5"></div></div>
                            <div class="col-md-4"><div class="mb-3"><label class="form-label">Max Products</label><input type="number" name="max_products" class="form-control" value="100"></div></div>
                            <div class="col-md-4"><div class="mb-3"><label class="form-label">Max Branches</label><input type="number" name="max_branches" class="form-control" value="1"></div></div>
                        </div>
                        <div class="row">
                            <div class="col-md-4"><div class="mb-3"><label class="form-label">Max Storage (GB)</label><input type="number" name="max_storage_gb" class="form-control" value="1"></div></div>
                            <div class="col-md-4"><div class="mb-3"><label class="form-label">Icon</label><select name="icon" class="form-select"><option value="fa-building">🏢 Building</option><option value="fa-crown">👑 Crown</option><option value="fa-star">⭐ Star</option><option value="fa-gem">💎 Gem</option><option value="fa-rocket">🚀 Rocket</option><option value="fa-chart-line">📈 Chart</option><option value="fa-briefcase">💼 Briefcase</option><option value="fa-trophy">🏆 Trophy</option></select></div></div>
                            <div class="col-md-4"><div class="mb-3"><label class="form-label">Color</label><select name="color" class="form-select"><option value="primary">🔵 Blue</option><option value="success">🟢 Green</option><option value="warning">🟡 Yellow</option><option value="danger">🔴 Red</option><option value="info">🔷 Cyan</option><option value="dark">⚫ Dark</option></select></div></div>
                        </div>
                        <div class="mb-3"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="2" placeholder="Describe this subscription plan..."></textarea></div>
                        <div class="row">
                            <div class="col-md-6"><div class="mb-3 form-check"><input type="checkbox" name="is_active" class="form-check-input" checked id="isActive"><label class="form-check-label" for="isActive">Active</label></div></div>
                            <div class="col-md-6">
                                <div class="mb-3 form-check"><input type="checkbox" name="feature_reports" class="form-check-input" id="featureReports"><label class="form-check-label" for="featureReports">📊 Reports</label></div>
                                <div class="mb-3 form-check"><input type="checkbox" name="feature_api" class="form-check-input" id="featureApi"><label class="form-check-label" for="featureApi">🔌 API Access</label></div>
                                <div class="mb-3 form-check"><input type="checkbox" name="feature_advanced_reports" class="form-check-input" id="featureAdvancedReports"><label class="form-check-label" for="featureAdvancedReports">📈 Advanced Reports</label></div>
                                <div class="mb-3 form-check"><input type="checkbox" name="feature_support" class="form-check-input" id="featureSupport"><label class="form-check-label" for="featureSupport">🛡️ Priority Support</label></div>
                            </div>
                        </div>
                        <div class="mt-4">
                            <button type="submit" class="btn btn-success"><i class="fas fa-save me-2"></i>Create Plan</button>
                            <a href="{% url 'tenants:subscription_plans_list' %}" class="btn btn-secondary"><i class="fas fa-times me-2"></i>Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
